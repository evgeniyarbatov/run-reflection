describe_scientist_run:
  description: |
    {activity_context}

    VARIATION
    {variation_prompt}

    TASK
    Draft a one- or two-sentence factual reflection fragment of this run.
    Not a summary — state what happened, without metaphor or performance.
    Use only the provided data; do not invent details that are not present.
  expected_output: "A one- or two-sentence draft factual reflection fragment of the run."
  agent: scientist
revise_scientist_with_personality:
  description: |
    DRAFT
    {draft_description}

    PERSONAL VOICE
    - Honest and independent; avoid hype, cliches, or groupthink.
    - Direct and pragmatic; concise phrasing.
    - Structured but natural; clear sentences without rigid formula.
    - Quiet and private; warm one-on-one tone, not performative.
    - Detail-aware; no exaggeration, choose concrete details.
    - Grounded creativity; one precise image is enough.

    TASK
    Revise the draft to sound distinctly human and like the author while preserving the
    factual tone and one- or two-sentence length.
    Keep the same facts; do not add new metrics or locations.
    Do not invent details that are not present in the data.
  expected_output: "A one- or two-sentence revised reflection in the scientist style and personal voice."
  agent: personality_editor